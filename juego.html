<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>La medalla perdida - juego lógico</title>
<style>
:root{--bg:#edf4ff;--ink:#0f172a;--muted:#64748b;--card:#fff;--line:#dbe4f0;--blue:#2563eb;--green:#16a34a;--red:#ef4444;--amber:#f59e0b;--purple:#7c3aed;--shadow:0 24px 70px rgba(15,23,42,.16)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;min-height:100%;overflow-x:hidden}body{font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--ink);background:radial-gradient(circle at 12% 8%,rgba(37,99,235,.16),transparent 28%),radial-gradient(circle at 90% 8%,rgba(22,163,74,.13),transparent 26%),linear-gradient(180deg,#f8fbff 0%,var(--bg) 55%,#e2e8f0 100%);padding:14px}.app{width:min(1240px,100%);margin:0 auto;background:#f8fafc;border-radius:30px;box-shadow:var(--shadow);overflow:hidden;border:1px solid rgba(148,163,184,.35)}.hero{color:#fff;padding:28px 30px;background:radial-gradient(circle at 15% 20%,rgba(56,189,248,.28),transparent 30%),radial-gradient(circle at 85% 5%,rgba(99,102,241,.28),transparent 30%),linear-gradient(135deg,#020617 0%,#0f172a 60%,#111827 100%)}.hero-row{display:grid;grid-template-columns:1fr auto;gap:22px;align-items:center}.badge{display:inline-flex;align-items:center;gap:8px;padding:8px 13px;border-radius:999px;color:#bfdbfe;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.16);font-size:12px;font-weight:900;letter-spacing:.45px;text-transform:uppercase}.badge span{width:9px;height:9px;border-radius:99px;background:#38bdf8;box-shadow:0 0 16px rgba(56,189,248,.95)}h1{margin:16px 0 8px;font-size:clamp(31px,5vw,54px);line-height:1.02;letter-spacing:-1.4px}.hero p{margin:0;max-width:820px;color:#cbd5e1;line-height:1.55;font-size:15.5px}.score-card{min-width:230px;padding:17px 19px;border-radius:22px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);text-align:center}.score-card .small{color:#93c5fd;font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.45px;margin-bottom:6px}.score-card .big{color:#22c55e;font-size:34px;font-weight:950;letter-spacing:-1px}.content{padding:18px;display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:18px;align-items:start}.card{background:#fff;border:1px solid var(--line);border-radius:26px;box-shadow:0 12px 34px rgba(15,23,42,.07);overflow:hidden}.left-stack,.right-stack{display:grid;gap:14px;min-width:0}.board-card{padding:14px}.board-top{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:10px;margin-bottom:12px}.status{display:inline-flex;align-items:center;gap:8px;padding:10px 13px;border-radius:999px;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;font-size:13px;font-weight:900}.pulse{width:9px;height:9px;border-radius:99px;background:currentColor;box-shadow:0 0 14px currentColor}.tools{display:flex;flex-wrap:wrap;gap:9px}.btn{border:none;border-radius:15px;padding:11px 13px;color:#fff;font-weight:900;font-size:13.5px;cursor:pointer;user-select:none;transition:transform .08s ease,opacity .08s ease}.btn:hover{transform:translateY(-1px);opacity:.96}.btn:active{transform:scale(.985)}.blue{background:linear-gradient(135deg,#2563eb,#4f46e5)}.green{background:linear-gradient(135deg,#16a34a,#0f766e)}.dark{background:linear-gradient(135deg,#334155,#0f172a)}.red{background:linear-gradient(135deg,#dc2626,#991b1b)}.amber{background:linear-gradient(135deg,#f59e0b,#d97706)}.purple{background:linear-gradient(135deg,#7c3aed,#5b21b6)}.board-wrap{width:100%;overflow-x:auto;overflow-y:hidden;padding-bottom:8px;overscroll-behavior-x:contain}.board{width:min(100%,720px);min-width:620px;margin:0 auto;display:grid;grid-template-columns:38px repeat(9,1fr);grid-template-rows:repeat(9,1fr) 34px;gap:3px;background:#dbe4f0;padding:3px;border-radius:18px;border:1px solid #cbd5e1}.label-cell{min-height:58px;display:grid;place-items:center;color:#475569;background:#f1f5f9;font-size:13px;font-weight:950;border-radius:12px}.col-label{min-height:32px}.cell{position:relative;min-height:58px;border-radius:12px;background:#f8fafc;overflow:hidden;border:2px solid transparent;cursor:pointer;user-select:none;transition:transform .08s ease,box-shadow .08s ease,border-color .08s ease}.cell:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(15,23,42,.10);border-color:rgba(37,99,235,.45)}.cell.selected-target{border-color:#2563eb;box-shadow:inset 0 0 0 2px rgba(37,99,235,.25)}.coord{position:absolute;top:4px;left:5px;color:rgba(15,23,42,.42);font-size:10px;font-weight:950;z-index:2}.zone-name{position:absolute;left:6px;bottom:5px;color:rgba(15,23,42,.45);font-size:9px;font-weight:900;text-transform:uppercase;letter-spacing:.2px;z-index:1;pointer-events:none}.object{position:absolute;right:4px;top:2px;font-size:20px;opacity:.95;z-index:1;pointer-events:none}.placed-token{position:absolute;inset:12px 8px 8px;border-radius:13px;display:grid;place-items:center;color:#fff;font-weight:950;font-size:14px;text-align:center;z-index:4;box-shadow:0 10px 18px rgba(15,23,42,.20);border:2px solid rgba(255,255,255,.65);line-height:1}.placed-token small{display:block;font-size:9px;margin-top:2px;opacity:.9}.zone-dormitorio{background:#dbeafe}.zone-sala{background:#dcfce7}.zone-cocina{background:#ffedd5}.zone-cobertizo{background:#e2e8f0}.zone-patio{background:#fef3c7}.zone-solarium{background:#ede9fe}.zone-estanque{background:#cffafe}.zone-jardin{background:#bbf7d0}.characters{padding:14px}.section-title{margin:0 0 12px;color:#1e293b;font-size:17px;font-weight:950;letter-spacing:-.2px}.token-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:9px}.token{border:2px solid transparent;border-radius:18px;padding:10px 8px;color:#fff;text-align:center;cursor:pointer;min-height:64px;display:grid;place-items:center;font-weight:950;box-shadow:0 9px 18px rgba(15,23,42,.16);user-select:none;transition:transform .08s ease,border-color .08s ease,opacity .08s ease}.token:hover{transform:translateY(-1px)}.token.selected{border-color:#0f172a;transform:scale(1.03);box-shadow:0 0 0 4px rgba(37,99,235,.16)}.token.placed{opacity:.55}.token .emoji{font-size:22px;line-height:1;display:block}.token .name{font-size:11px;margin-top:5px;display:block}.token .coord-mini{font-size:10px;opacity:.9;margin-top:2px;display:block}.side-panel{padding:14px}.clue-list{display:grid;gap:8px}.clue{border-radius:16px;padding:10px 11px;background:#f8fafc;border:1px solid #e2e8f0;color:#334155;font-size:13px;line-height:1.35}.clue.ok{background:#dcfce7;border-color:#86efac;color:#166534}.clue.bad{background:#fee2e2;border-color:#fca5a5;color:#991b1b}.clue.pending{background:#f8fafc;color:#64748b}.result-box{margin-top:12px;border-radius:20px;padding:14px;background:#0f172a;color:white;display:grid;gap:10px}.result-box .text{color:#cbd5e1;font-size:14px;line-height:1.45}.result-box b{color:white}.culprit{border-radius:18px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);color:#22c55e;padding:12px;text-align:center;font-size:24px;font-weight:950}.teacher-panel{padding:14px;display:none}.teacher-panel.open{display:block}.solution-grid{display:grid;gap:6px;margin-top:8px;font-size:13px;color:#334155}.solution-item{display:flex;justify-content:space-between;gap:8px;border-radius:12px;padding:8px 10px;background:#f8fafc;border:1px solid #e2e8f0}.toast{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);width:min(92vw,520px);padding:14px 16px;border-radius:18px;color:white;background:#0f172a;box-shadow:0 18px 45px rgba(15,23,42,.32);font-weight:850;display:none;z-index:100}.toast.show{display:block;animation:pop .2s ease-out}@keyframes pop{from{transform:translateX(-50%) translateY(10px);opacity:.3}to{transform:translateX(-50%) translateY(0);opacity:1}}.confetti{pointer-events:none;position:fixed;inset:0;overflow:hidden;z-index:99}.piece{position:absolute;top:-20px;animation:fall 1.5s linear forwards;font-size:22px}@keyframes fall{to{transform:translateY(110vh) rotate(320deg);opacity:0}}@media(max-width:980px){body{padding:8px}.app{border-radius:24px}.hero{padding:22px 18px}.hero-row{grid-template-columns:1fr}.score-card{min-width:0}.content{grid-template-columns:1fr;padding:12px}.right-stack{grid-row:2}.board{min-width:590px}.token-grid{grid-template-columns:repeat(3,minmax(0,1fr))}}@media(max-width:520px){h1{font-size:29px}.tools{width:100%;display:grid;grid-template-columns:1fr 1fr}.btn{width:100%}.board-card{padding:10px}.board{min-width:560px}.label-cell,.cell{min-height:54px}.placed-token{font-size:12px;inset:13px 5px 6px}.zone-name{display:none}.token-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.token{min-height:58px}.token .name{font-size:10px}}
</style>
</head>
<body>
<main class="app">
<header class="hero"><div class="hero-row"><div><div class="badge"><span></span> Juego lógico interactivo</div><h1>La medalla perdida</h1><p>Ubicá a cada personaje en el mapa usando las pistas. Cuando todas las pistas se cumplan, vas a poder descubrir quién escondió la medalla.</p></div><div class="score-card"><div class="small">Puntaje</div><div id="score" class="big">100</div></div></div></header>
<section class="content"><div class="left-stack"><section class="card board-card"><div class="board-top"><div id="status" class="status"><span class="pulse"></span> Elegí una ficha</div><div class="tools"><button id="checkBtn" class="btn green">Comprobar</button><button id="hintBtn" class="btn amber">Pista</button><button id="resetBtn" class="btn dark">Reiniciar</button><button id="teacherBtn" class="btn purple">Docente</button></div></div><div class="board-wrap"><div id="board" class="board"></div></div></section><section class="card characters"><h2 class="section-title">Personajes</h2><div id="tokens" class="token-grid"></div></section></div><aside class="right-stack"><section class="card side-panel"><h2 class="section-title">Pistas</h2><div id="clues" class="clue-list"></div><div class="result-box"><div id="resultText" class="text">Todavía no sabemos quién escondió la medalla.</div><div id="culpritBox" class="culprit">?</div></div></section><section id="teacherPanel" class="card teacher-panel"><h2 class="section-title">Modo docente</h2><div class="tools" style="margin-bottom:10px"><button id="solveBtn" class="btn green">Completar solución</button><button id="clearBtn" class="btn red">Limpiar mapa</button></div><div class="solution-grid" id="solutionList"></div></section></aside></section>
</main><div id="toast" class="toast"></div><div id="confetti" class="confetti"></div>
<script>
const cols=["A","B","C","D","E","F","G","H","I"],rows=[9,8,7,6,5,4,3,2,1];
const zones={},objects={};
function setZone(cells,zone){cells.forEach(cell=>zones[cell]=zone)}
function cellsRect(c1,c2,r1,r2){const a=cols.indexOf(c1),b=cols.indexOf(c2),out=[];for(let r=r1;r<=r2;r++){for(let c=a;c<=b;c++)out.push(cols[c]+r)}return out}
setZone(cellsRect("A","C",1,3),"Dormitorio");setZone(cellsRect("D","F",1,3),"Sala de estar");setZone(cellsRect("G","I",1,3),"Cocina");setZone(cellsRect("A","C",4,5),"Cobertizo");setZone(cellsRect("D","F",4,5),"Patio trasero");setZone(cellsRect("G","I",4,6),"Solárium");setZone(cellsRect("A","F",6,9),"Estanque");setZone(cellsRect("G","I",7,9),"Jardín");
objects.E2="🪑";objects.F1="🟫";objects.H9="🌳";objects.B3="🌳";objects.A6="🌳";objects.G6="🌳";
const zoneClass={"Dormitorio":"zone-dormitorio","Sala de estar":"zone-sala","Cocina":"zone-cocina","Cobertizo":"zone-cobertizo","Patio trasero":"zone-patio","Solárium":"zone-solarium","Estanque":"zone-estanque","Jardín":"zone-jardin"};
const people=[{id:"julian",name:"Julián",emoji:"🧢",color:"#2563eb"},{id:"mateo",name:"Mateo",emoji:"🎒",color:"#dc2626"},{id:"noelia",name:"Noelia",emoji:"🌸",color:"#7c3aed"},{id:"paula",name:"Paula",emoji:"🎧",color:"#0891b2"},{id:"lucia",name:"Lucía",emoji:"📚",color:"#16a34a"},{id:"tomas",name:"Tomás",emoji:"⚽",color:"#f59e0b"},{id:"ramiro",name:"Ramiro",emoji:"🧩",color:"#0f766e"},{id:"sergio",name:"Sergio",emoji:"🕶️",color:"#475569"},{id:"violeta",name:"Violeta",emoji:"💜",color:"#be185d"}];
const solution={julian:"D3",mateo:"B5",noelia:"G9",paula:"I6",lucia:"E2",tomas:"F1",ramiro:"H7",sergio:"C8",violeta:"A4"};
const clueTexts=["Julián estaba con Lucía en la sala de estar.","Mateo estaba en el cobertizo.","Noelia estaba al lado de un árbol.","Paula estaba en el dormitorio o en el solárium.","Lucía estaba sentada en una silla en la sala de estar.","Tomás estaba sobre una alfombra.","Ramiro estaba en el jardín.","Sergio estaba solo.","Violeta estaba sola con quien escondió la medalla."];
let placements={},selected=null,attempts=0,hints=0;
const boardEl=document.getElementById("board"),tokensEl=document.getElementById("tokens"),cluesEl=document.getElementById("clues"),statusEl=document.getElementById("status"),scoreEl=document.getElementById("score"),resultText=document.getElementById("resultText"),culpritBox=document.getElementById("culpritBox"),toast=document.getElementById("toast"),teacherPanel=document.getElementById("teacherPanel"),solutionList=document.getElementById("solutionList");
function coordParts(coord){return{col:coord[0],row:Number(coord.slice(1))}}
function sameZone(a,b){return a&&b&&zones[a]===zones[b]}
function zoneOf(id){return placements[id]?zones[placements[id]]:null}
function objectOf(id){return placements[id]?objects[placements[id]]:null}
function personAt(cell){return Object.keys(placements).find(id=>placements[id]===cell)}
function adjacentToObject(cell,obj){if(!cell)return false;const p=coordParts(cell),ci=cols.indexOf(p.col);const ns=[cols[ci-1]?cols[ci-1]+p.row:null,cols[ci+1]?cols[ci+1]+p.row:null,p.col+(p.row-1),p.col+(p.row+1)].filter(Boolean);return ns.some(n=>objects[n]===obj)}
function countPeopleInZone(zone){return Object.values(placements).filter(cell=>zones[cell]===zone).length}
function peopleInZone(zone){return Object.entries(placements).filter(([id,cell])=>zones[cell]===zone).map(([id])=>id)}
function validateAll(){const placedCount=Object.keys(placements).length,rowsUsed={},colsUsed={};for(const cell of Object.values(placements)){const p=coordParts(cell);rowsUsed[p.row]=(rowsUsed[p.row]||0)+1;colsUsed[p.col]=(colsUsed[p.col]||0)+1}const noSameRow=Object.values(rowsUsed).every(v=>v<=1),noSameCol=Object.values(colsUsed).every(v=>v<=1);const clueResults=[placements.julian&&placements.lucia&&zoneOf("julian")==="Sala de estar"&&zoneOf("lucia")==="Sala de estar"&&sameZone(placements.julian,placements.lucia),placements.mateo&&zoneOf("mateo")==="Cobertizo",placements.noelia&&adjacentToObject(placements.noelia,"🌳"),placements.paula&&["Dormitorio","Solárium"].includes(zoneOf("paula")),placements.lucia&&zoneOf("lucia")==="Sala de estar"&&objectOf("lucia")==="🪑",placements.tomas&&objectOf("tomas")==="🟫",placements.ramiro&&zoneOf("ramiro")==="Jardín",placements.sergio&&countPeopleInZone(zoneOf("sergio"))===1,placements.violeta&&countPeopleInZone(zoneOf("violeta"))===2].map(Boolean);const allClues=clueResults.every(Boolean),allPlaced=placedCount===people.length;return{allPlaced,noSameRow,noSameCol,clueResults,allClues,win:allPlaced&&noSameRow&&noSameCol&&allClues}}
function currentCulprit(){if(!placements.violeta)return null;const z=zoneOf("violeta"),ids=peopleInZone(z).filter(id=>id!=="violeta");return ids.length===1?ids[0]:null}
function score(){return Math.max(0,100-attempts*5-hints*8)}
function showToast(msg){toast.innerHTML=msg;toast.classList.add("show");clearTimeout(showToast.timer);showToast.timer=setTimeout(()=>toast.classList.remove("show"),3200)}
function createBoard(){boardEl.innerHTML="";rows.forEach(row=>{const rowLabel=document.createElement("div");rowLabel.className="label-cell";rowLabel.textContent=row;boardEl.appendChild(rowLabel);cols.forEach(col=>{const coord=col+row,zone=zones[coord];const cell=document.createElement("div");cell.className=`cell ${zoneClass[zone]||""}`;cell.dataset.coord=coord;cell.innerHTML=`<div class="coord">${coord}</div>`;if(objects[coord])cell.innerHTML+=`<div class="object">${objects[coord]}</div>`;if(["A1","D1","G1","A4","D4","G4","A7","G7"].includes(coord))cell.innerHTML+=`<div class="zone-name">${zone}</div>`;cell.addEventListener("click",()=>onCellClick(coord));boardEl.appendChild(cell)})});const empty=document.createElement("div");empty.className="label-cell col-label";boardEl.appendChild(empty);cols.forEach(col=>{const el=document.createElement("div");el.className="label-cell col-label";el.textContent=col;boardEl.appendChild(el)})}
function createTokens(){tokensEl.innerHTML="";people.forEach(p=>{const token=document.createElement("div");token.className="token";token.dataset.id=p.id;token.style.background=`linear-gradient(135deg,${p.color},#0f172a)`;token.innerHTML=`<span><span class="emoji">${p.emoji}</span><span class="name">${p.name}</span><span class="coord-mini">${placements[p.id]||"sin ubicar"}</span></span>`;token.addEventListener("click",()=>{selected=selected===p.id?null:p.id;updateUI()});tokensEl.appendChild(token)})}
function createClues(){cluesEl.innerHTML="";clueTexts.forEach((txt,index)=>{const clue=document.createElement("div");clue.className="clue pending";clue.dataset.index=index;clue.textContent=txt;cluesEl.appendChild(clue)})}
function createSolutionList(){solutionList.innerHTML="";people.forEach(p=>{const item=document.createElement("div");item.className="solution-item";item.innerHTML=`<b>${p.name}</b><span>${solution[p.id]}</span>`;solutionList.appendChild(item)});const culprit=document.createElement("div");culprit.className="solution-item";culprit.innerHTML="<b>Escondió la medalla</b><span>Mateo</span>";solutionList.appendChild(culprit)}
function onCellClick(coord){if(!selected){const id=personAt(coord);if(id){selected=id;updateUI()}else showToast("Primero elegí una ficha de personaje.");return}const occupying=personAt(coord);if(occupying&&occupying!==selected)delete placements[occupying];placements[selected]=coord;selected=null;updateUI()}
function renderPlacements(){document.querySelectorAll(".placed-token").forEach(el=>el.remove());Object.entries(placements).forEach(([id,coord])=>{const person=people.find(p=>p.id===id),cell=document.querySelector(`.cell[data-coord="${coord}"]`);if(!person||!cell)return;const token=document.createElement("div");token.className="placed-token";token.style.background=`linear-gradient(135deg,${person.color},#0f172a)`;token.innerHTML=`${person.emoji}<small>${person.name}</small>`;cell.appendChild(token)})}
function updateUI(){createTokens();renderPlacements();document.querySelectorAll(".token").forEach(t=>{const id=t.dataset.id;t.classList.toggle("selected",id===selected);t.classList.toggle("placed",Boolean(placements[id]))});document.querySelectorAll(".cell").forEach(c=>c.classList.toggle("selected-target",selected!==null));if(selected){const p=people.find(x=>x.id===selected);statusEl.innerHTML=`<span class="pulse"></span> Ubicá a ${p.name}`}else{statusEl.innerHTML=`<span class="pulse"></span> ${Object.keys(placements).length}/9 ubicados`}scoreEl.textContent=score();updateResult(false)}
function statClues(v,afterCheck){[...document.querySelectorAll(".clue")].forEach((el,i)=>{el.className="clue";if(!afterCheck)el.classList.add("pending");else el.classList.add(v.clueResults[i]?"ok":"bad")})}
function updateResult(afterCheck){const v=validateAll();statClues(v,afterCheck);if(v.win){const p=people.find(x=>x.id===currentCulprit());resultText.innerHTML=`Todas las pistas se cumplen. Violeta estaba sola con <b>${p.name}</b>.`;culpritBox.textContent=p.name}else{resultText.innerHTML="Todavía no sabemos quién escondió la medalla.";culpritBox.textContent="?"}}
function checkGame(){attempts++;const v=validateAll();updateResult(true);scoreEl.textContent=score();if(!v.allPlaced)return showToast("Todavía faltan personajes por ubicar.");if(!v.noSameRow)return showToast("Hay dos o más personajes en una misma fila.");if(!v.noSameCol)return showToast("Hay dos o más personajes en una misma columna.");if(!v.allClues)return showToast("Algunas pistas todavía no se cumplen. Mirá las pistas en rojo.");celebrate();const p=people.find(x=>x.id===currentCulprit());showToast(`¡Caso resuelto! La medalla la escondió <b>${p.name}</b>.`)}
function giveHint(){hints++;scoreEl.textContent=score();const v=validateAll(),idx=v.clueResults.findIndex(x=>!x);showToast(idx===-1?"Las pistas ya se cumplen. Revisá filas, columnas o completá personajes.":`Pista: revisá → ${clueTexts[idx]}`)}
function resetGame(){placements={};selected=null;attempts=0;hints=0;createClues();updateUI();updateResult(false);showToast("Mapa reiniciado.")}
function clearOnly(){placements={};selected=null;createClues();updateUI();updateResult(false)}
function solveGame(){placements={...solution};selected=null;updateUI();updateResult(true);showToast("Solución cargada en el mapa.")}
function celebrate(){const box=document.getElementById("confetti");box.innerHTML="";const icons=["🎉","🏐","🏅","✨","🧩"];for(let i=0;i<34;i++){const p=document.createElement("div");p.className="piece";p.textContent=icons[Math.floor(Math.random()*icons.length)];p.style.left=Math.random()*100+"vw";p.style.animationDelay=Math.random()*.5+"s";p.style.animationDuration=1.2+Math.random()*1.4+"s";box.appendChild(p)}setTimeout(()=>box.innerHTML="",2600)}
document.getElementById("checkBtn").addEventListener("click",checkGame);document.getElementById("hintBtn").addEventListener("click",giveHint);document.getElementById("resetBtn").addEventListener("click",resetGame);document.getElementById("teacherBtn").addEventListener("click",()=>teacherPanel.classList.toggle("open"));document.getElementById("solveBtn").addEventListener("click",solveGame);document.getElementById("clearBtn").addEventListener("click",clearOnly);
createBoard();createTokens();createClues();createSolutionList();updateUI();
</script>
</body>
</html>
